server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**
        - id: file-transfer-service
          uri: lb://file-transfer-service
          predicates:
            - Path=/api/transfers/**,/api/peers/**,/ws/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
