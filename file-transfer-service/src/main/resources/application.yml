server:
  port: 8083

spring:
  application:
    name: file-transfer-service
  datasource:
    url: jdbc:h2:mem:filetransferdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

file-transfer:
  chunk-size: 1048576
  storage-path: ./uploads
