server:
  port: 8084

spring:
  application:
    name: file-metadata-service
  datasource:
    url: jdbc:h2:mem:filemetadatadb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
